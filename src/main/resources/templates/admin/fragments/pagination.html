<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Fragment de pagination réutilisable -->
<div th:fragment="pagination(currentPage, totalPages, baseUrl)" class="d-flex justify-content-between align-items-center mt-4">
    <div class="pagination-info">
        <span class="text-muted">
            Page <span th:text="${currentPage + 1}">1</span> sur <span th:text="${totalPages}">10</span>
        </span>
    </div>
    
    <nav aria-label="Navigation des pages" th:if="${totalPages > 1}">
        <ul class="pagination pagination-sm mb-0">
            <!-- Bouton Précédent -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="${currentPage > 0} ? ${baseUrl + '?page=' + (currentPage - 1)} : '#'" 
                   th:attr="tabindex=${currentPage == 0} ? '-1' : null">
                    <i class="fas fa-chevron-left"></i> Précédent
                </a>
            </li>
            
            <!-- Première page -->
            <li class="page-item" th:if="${currentPage > 2}">
                <a class="page-link" th:href="${baseUrl + '?page=0'}">1</a>
            </li>
            
            <!-- Points de suspension -->
            <li class="page-item disabled" th:if="${currentPage > 3}">
                <span class="page-link">...</span>
            </li>
            
            <!-- Pages autour de la page courante -->
            <li class="page-item" 
                th:each="page : ${#numbers.sequence(T(java.lang.Math).max(0, currentPage - 2), T(java.lang.Math).min(totalPages - 1, currentPage + 2))}"
                th:classappend="${page == currentPage} ? 'active'">
                <a class="page-link" th:href="${baseUrl + '?page=' + page}" th:text="${page + 1}">1</a>
            </li>
            
            <!-- Points de suspension -->
            <li class="page-item disabled" th:if="${currentPage < totalPages - 4}">
                <span class="page-link">...</span>
            </li>
            
            <!-- Dernière page -->
            <li class="page-item" th:if="${currentPage < totalPages - 3}">
                <a class="page-link" th:href="${baseUrl + '?page=' + (totalPages - 1)}" th:text="${totalPages}">10</a>
            </li>
            
            <!-- Bouton Suivant -->
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="${currentPage < totalPages - 1} ? ${baseUrl + '?page=' + (currentPage + 1)} : '#'"
                   th:attr="tabindex=${currentPage >= totalPages - 1} ? '-1' : null">
                    Suivant <i class="fas fa-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

<!-- Fragment de pagination avec paramètres de recherche -->
<div th:fragment="paginationWithParams(currentPage, totalPages, baseUrl, params)" class="d-flex justify-content-between align-items-center mt-4">
    <div class="pagination-info">
        <span class="text-muted">
            Page <span th:text="${currentPage + 1}">1</span> sur <span th:text="${totalPages}">10</span>
        </span>
    </div>
    
    <nav aria-label="Navigation des pages" th:if="${totalPages > 1}">
        <ul class="pagination pagination-sm mb-0">
            <!-- Bouton Précédent -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="${currentPage > 0} ? ${baseUrl + '?page=' + (currentPage - 1) + params} : '#'" 
                   th:attr="tabindex=${currentPage == 0} ? '-1' : null">
                    <i class="fas fa-chevron-left"></i> Précédent
                </a>
            </li>
            
            <!-- Pages -->
            <li class="page-item" 
                th:each="page : ${#numbers.sequence(T(java.lang.Math).max(0, currentPage - 2), T(java.lang.Math).min(totalPages - 1, currentPage + 2))}"
                th:classappend="${page == currentPage} ? 'active'">
                <a class="page-link" th:href="${baseUrl + '?page=' + page + params}" th:text="${page + 1}">1</a>
            </li>
            
            <!-- Bouton Suivant -->
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="${currentPage < totalPages - 1} ? ${baseUrl + '?page=' + (currentPage + 1) + params} : '#'"
                   th:attr="tabindex=${currentPage >= totalPages - 1} ? '-1' : null">
                    Suivant <i class="fas fa-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
